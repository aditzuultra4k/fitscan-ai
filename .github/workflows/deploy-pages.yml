name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web app
        run: npx expo export --platform web --output-dir dist
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"

      - name: Prepare GitHub Pages paths
        run: |
          node -e "const fs=require('fs'); for (const file of ['dist/index.html']) { let html=fs.readFileSync(file,'utf8'); html=html.replaceAll('src=\"/_expo/','src=\"/fitscan-ai/_expo/'); fs.writeFileSync(file, html); } fs.copyFileSync('dist/index.html','dist/404.html'); fs.writeFileSync('dist/.nojekyll','');"

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
